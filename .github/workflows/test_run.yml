name: UI-tests on book store

on:
  push

jobs:
  test_ui:
    runs-on: ubuntu-latest

    steps:
      - name: Git Clone Repository
        uses: actions/checkout@v3
      - name: Install Python
        with:
          python-version: "3.13"
        uses: actions/setup-python@v4
      - name: Install Chrome
        run: sudo apt-get install google-chrome-stable
      - name: Download dependens 
        run: pip install -r requirements.txt
      - name: Run tests
        run: pytest tests/test_basket.py -s -v 
